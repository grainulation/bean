name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Format check
        run: npx --yes prettier@3.3 --check .
      - name: Smoke test (manifests, frontmatter, links)
        run: node test/smoke.test.js
      - name: Doc-only guard (no runtime dependencies)
        run: |
          node -e "const p=require('./package.json'); if (p.dependencies && Object.keys(p.dependencies).length) { console.error('bean is doc-only: no runtime dependencies allowed'); process.exit(1); } console.log('ok: zero runtime dependencies');"
